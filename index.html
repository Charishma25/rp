<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beam Damage Detection</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: Arial;
    margin:0;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
}

header {
    text-align:center;
    padding:20px;
    color:white;
    font-size:1.5rem;
}

.container {
    background:white;
    margin:20px auto;
    padding:20px;
    border-radius:15px;
    width:95%;
    max-width:1100px;
}

img {
    width:100%;
    max-width:800px;
    display:block;
    margin:auto;
    border-radius:10px;
}

.controls {
    text-align:center;
    margin:15px;
}

input, button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#4facfe;
    color:white;
    cursor:pointer;
}

button:hover {
    background:#007bff;
}

table {
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    overflow-x:auto;
}

th, td {
    padding:8px;
    border:1px solid #ddd;
    text-align:center;
}

th {
    background:#4facfe;
    color:white;
}

.warning {
    background:red;
    color:white;
    font-weight:bold;
}

@media (max-width:768px) {
    th, td {
        font-size:12px;
    }
}
</style>
</head>

<body>

<header>🚀 Beam Damage Detection</header>

<div class="container">

<h2>Experimental Setup (Beam with Accelerometer)</h2>

<img src="beam.jpg">

<div class="controls">
<input type="file" id="csvFile">
<button onclick="generateData()">Generate Demo Data</button>
<button onclick="predictFuture()">Predict Next Value</button>
</div>

<canvas id="chart"></canvas>

<table>
<thead>
<tr>
<th>Time</th>
<th>Acceleration</th>
<th>ΔA (%)</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

<script>

document.getElementById("csvFile").addEventListener("change", function(e) {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event) {
        handleData(event.target.result);
    };

    reader.readAsText(file);
});

// ✅ FIXED FUNCTION (ONLY ONE)
function handleData(text) {
    const rows = text.trim().split("\n");
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    let times = [];
    let acc = [];
    let prevA = null;

    for (let i = 1; i < rows.length; i++) {

        let row = rows[i].trim();
        if (!row) continue;

        let cols = row.split(",");

        let T = parseFloat(cols[0]);
        let A = parseFloat(cols[1]);

        if (isNaN(T) || isNaN(A)) continue;

        let deltaA = prevA !== null && prevA !== 0
            ? Math.abs((A - prevA) / prevA) * 100
            : 0;

        let tr = document.createElement("tr");

        if (deltaA >= 20) tr.classList.add("warning");

        tr.innerHTML = `
            <td>${T}</td>
            <td>${A.toFixed(4)}</td>
            <td>${deltaA.toFixed(2)}</td>
            <td>${deltaA >= 20 ? "⚠️ DAMAGE" : "Normal"}</td>
        `;

        tbody.appendChild(tr);

        times.push(T);
        acc.push(A);
        prevA = A;
    }

    if (times.length > 0) {
        drawChart(times, acc);
    } else {
        alert("CSV not read properly");
    }
}

// Demo data
function generateData() {
    let data = "Time,Acceleration\n";
    let acc = 1;

    for (let i = 0; i < 100; i++) {
        acc += (Math.random() - 0.5);
        data += `${i},${acc.toFixed(2)}\n`;
    }

    handleData(data);
}

let chart;

function drawChart(times, acc) {
    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            labels: times,
            datasets: [{
                label: "Acceleration vs Time",
                data: acc,
                borderWidth: 2,
                tension: 0.3
            }]
        }
    });
}

// ML prediction
async function predictFuture() {
    let rows = document.querySelectorAll("#tableBody tr");

    if (rows.length < 10) {
        alert("Need at least 10 data points");
        return;
    }

    let values = [];

    for (let i = rows.length - 10; i < rows.length; i++) {
        values.push(parseFloat(rows[i].children[1].innerText));
    }

    let response = await fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ values: values })
    });

    let result = await response.json();

    alert("Predicted: " + result.prediction.toFixed(3));
}

</script>

</body>
</html>
